<header class="main-header" [class.nav-shadow]="pageYPosition > 0">
  <div class="container nav-container">
    <!-- Brand / Logo (Left) -->
    <div class="logo-wrapper">
      <a (click)="scroll('/')" class="brand-logo">&lt;br/&gt;</a>
    </div>

    <!-- Desktop Navigation Links (Center) -->
    <nav class="desktop-nav-menu">
      <ul class="nav-links">
        <li *ngFor="let item of 'Header.Items' | translate | asArray; let i = index">
          <a (click)="scroll(item.scroll)" class="nav-item-link" [class.active]="activeRouteSection === item.scroll">
            {{item.title}}
          </a>
        </li>
      </ul>
    </nav>

    <!-- Controls (Right): Resume, Language, Theme -->
    <div class="desktop-nav-controls">
      <!-- CV Button -->
      <a href="https://docs.google.com/document/d/1B-YwXMlKY1WLx1k1LM1p9Yc375JIcaRawzl87DoHscs/export?format=pdf" class="cv-button" target="_blank">{{"Header.cvBtn" | translate}}</a>


      <!-- Language Switcher Dropdown -->
      <div class="lang-dropdown-wrapper" ngbDropdown placement="bottom-end">
        <button class="lang-toggle-btn" ngbDropdownToggle [attr.aria-label]="'Language'">
          <i class="fas fa-globe"></i>
          <span class="lang-text">{{ languageService.language() | uppercase }}</span>
          <i class="fas fa-chevron-down arrow-down"></i>
        </button>
        <div ngbDropdownMenu class="lang-dropdown-menu">
          <button ngbDropdownItem (click)="changeLanguage('en')" class="dropdown-item-btn" [class.active]="languageService.language() === 'en'">
            EN - English
          </button>
          <button ngbDropdownItem (click)="changeLanguage('es')" class="dropdown-item-btn" [class.active]="languageService.language() === 'es'">
             ES - Español
          </button>
          <button ngbDropdownItem (click)="changeLanguage('hi')" class="dropdown-item-btn" [class.active]="languageService.language() === 'hi'">
             HI - हिन्दी
          </button>
          <button ngbDropdownItem (click)="changeLanguage('fr')" class="dropdown-item-btn" [class.active]="languageService.language() === 'fr'">
             FR - Français
          </button>
        </div>
      </div>

      <!-- Theme Toggle Button -->
      <button (click)="themeService.toggleTheme()" class="theme-toggle-btn" [attr.aria-label]="'Toggle Theme'">
        <i class="fas" [class.fa-sun]="themeService.isDarkTheme()" [class.fa-moon]="!themeService.isDarkTheme()"></i>
      </button>
    </div>

    <!-- Mobile Hamburger Toggle -->
    <button class="hamburger-toggle" (click)="responsiveMenuVisible = !responsiveMenuVisible" [attr.aria-label]="'Toggle Menu'">
      <span class="hamburger-line" [class.open]="responsiveMenuVisible"></span>
      <span class="hamburger-line" [class.open]="responsiveMenuVisible"></span>
      <span class="hamburger-line" [class.open]="responsiveMenuVisible"></span>
    </button>
  </div>
</header>

<!-- Mobile Drawer Overlay -->
<div class="mobile-drawer-overlay" [class.open]="responsiveMenuVisible" (click)="responsiveMenuVisible = false"></div>

<!-- Mobile Drawer -->
<div class="mobile-drawer" [class.open]="responsiveMenuVisible">
  <div class="drawer-header">
    <a (click)="scroll('/')" class="brand-logo">&lt;br/&gt;</a>
    <button class="close-drawer-btn" (click)="responsiveMenuVisible = false" [attr.aria-label]="'Close Menu'">
      <i class="fas fa-times"></i>
    </button>
  </div>
  
  <nav class="mobile-nav-menu">
    <ul class="mobile-nav-links">
      <li *ngFor="let item of 'Header.Items' | translate | asArray; let i = index">
        <a (click)="scroll(item.scroll)" class="mobile-nav-item-link" [class.active]="activeRouteSection === item.scroll">
          {{item.title}}
        </a>
      </li>
      <li>
        <a href="https://docs.google.com/document/d/1B-YwXMlKY1WLx1k1LM1p9Yc375JIcaRawzl87DoHscs/export?format=pdf" (click)="responsiveMenuVisible = false" class="cv-button mobile-cv-btn" target="_blank">{{"Header.cvBtn" | translate}}</a>
      </li>
    </ul>

    <!-- Controls in Mobile Drawer -->
    <div class="drawer-controls">
      <div class="mobile-lang-selector">
        <button class="mobile-lang-btn" [class.active]="languageService.language() === 'en'" (click)="changeLanguage('en')">EN</button>
        <span class="divider">|</span>
        <button class="mobile-lang-btn" [class.active]="languageService.language() === 'es'" (click)="changeLanguage('es')">ES</button>
        <span class="divider">|</span>
        <button class="mobile-lang-btn" [class.active]="languageService.language() === 'hi'" (click)="changeLanguage('hi')">HI</button>
        <span class="divider">|</span>
        <button class="mobile-lang-btn" [class.active]="languageService.language() === 'fr'" (click)="changeLanguage('fr')">FR</button>
      </div>

      <!-- Theme Toggle -->
      <button (click)="themeService.toggleTheme(); responsiveMenuVisible = false" class="drawer-theme-toggle" [attr.aria-label]="'Toggle Theme'">
        <i class="fas" [class.fa-sun]="themeService.isDarkTheme()" [class.fa-moon]="!themeService.isDarkTheme()"></i>
        <span>Theme</span>
      </button>
    </div>
  </nav>
</div>
