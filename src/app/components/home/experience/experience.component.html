<section class="section jobs" id='jobs'>
    <div class="container">
        <div class="section-box">
            <div *ngIf="!hideTitle" class="about-title mb-5" data-aos="fade-up" data-aos-duration="1000">
                <h3 class="e-font section-title">
                    {{"Experience.Title" | translate}}
                </h3>
            </div>
            
            <div class="experience-layout">
                <!-- Left Nav: Sticky sidebar links -->
                <div class="sticky-sidebar" data-aos="fade-up" data-aos-duration="1000">
                    <ul class="sidebar-nav-links">
                        <li 
                            *ngFor='let job of "Experience.Jobs" | translate | asArray; let i = index' 
                            class="sidebar-nav-item"
                            [class.active]="activeJobIndex === i"
                            (click)="scrollToJob(i)"
                        >
                            {{ job.Tab }}
                        </li>
                    </ul>
                </div>

                <!-- Right Side: Vertical Timeline -->
                <div class="timeline-container" data-aos="fade-up" data-aos-duration="1000">
                    <div 
                        *ngFor='let job of "Experience.Jobs" | translate | asArray; let i = index' 
                        class="timeline-item"
                        [id]="'job-' + i"
                    >
                        <div class="timeline-dot"></div>
                        
                        <!-- Job Header with Company Name, Logo icon, and Total Duration -->
                        <div class="job-header">
                            <div class="company-header-container">
                                <div class="company-logo-wrapper" *ngIf="job.logoClass">
                                    <i [class]="job.logoClass + ' company-icon'"></i>
                                </div>
                                <div class="company-details">
                                    <h4 class='job-title'>
                                        <span class="company">{{ job.Tab }}</span>
                                    </h4>
                                    <p class="total-duration" *ngIf="getJobDuration(job)">{{ getJobDuration(job) }}</p>
                                </div>
                            </div>
                            <!-- If no roles list, show the default title and date -->
                            <div class="single-role-info" *ngIf="!job.Roles">
                                <h5 class="job-role-title">{{ job.Title }}</h5>
                                <p class="job-date">{{ job.Date }}</p>
                            </div>
                        </div>

                        <!-- Nested Roles Timeline (Horizontal on desktop, stackable) -->
                        <div class="horizontal-roles-timeline" *ngIf="job.Roles">
                            <div class="horizontal-role-item" *ngFor="let role of getReversedRoles(job.Roles); let lastRole = last">
                                <div class="role-step-node">
                                    <div class="role-node-circle"></div>
                                    <div class="role-node-line" *ngIf="!lastRole"></div>
                                </div>
                                <div class="role-step-info">
                                    <h5 class="role-step-title">{{ role.Title }}</h5>
                                    <p class="role-step-date">{{ role.Date }}</p>
                                </div>
                            </div>
                        </div>

                        <ul class="job-desc-list">
                            <li 
                                *ngFor='let jobDescriptionParagraph of job.Description' 
                                class="job-desc-item"
                                [innerHTML]="jobDescriptionParagraph | translate"
                            ></li>
                        </ul>
                        <ul class="tech-badges-list">
                            <li *ngFor='let technology of job.Technologies'>
                                <span class="tech-badge">{{ technology }}</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
