<section class="section about" id='about'>
    <div class="container">
        <div class="section-box">
            <!-- About Section -->
            <div class="about-title" data-aos="fade-up">
                <h3 class="section-title">
                    {{"AboutMe.Title" | translate}}
                </h3>
            </div>
            <div class="row">
                <div class="col-12 col-md-6 mb-4 mb-md-0">
                    <div class="about-description">
                        <p *ngFor='let text of "AboutMe.Paragraphs" | translate | asArray' [innerHTML]="text" data-aos="fade-up" data-aos-duration="1000">
                        </p>
                    </div>
                </div>
                <div class="col-12 col-md-6 mt-4 mt-md-0 text-center" data-aos="fade-up" data-aos-duration="1000">
                    <div class="about-img-container">
                        <img class="rounded" width="300" height="300" src="/assets/images/me.jpg" alt="Breejesh Rathod">
                    </div>
                </div>
            </div>

            <!-- Core Tech Stack Section -->
            <div class="about-section-block" data-aos="fade-up" data-aos-duration="1000">
                <div class="about-title mt-section">
                    <h3 class="section-title">
                        {{"TechStack.Title" | translate}}
                    </h3>
                </div>
                <div class="tech-pills-grid">
                    <div
                        class="tech-pill"
                        *ngFor='let skill of "TechStack.Skills" | translate | asArray'
                        [style.--pill-color]="skill.Color"
                    >
                        <ng-container *ngIf="skill.IconClass !== 'ts-logo'; else tsLogo">
                            <i [class]="skill.IconClass + ' pill-icon'" [style.color]="skill.Color"></i>
                        </ng-container>
                        <ng-template #tsLogo>
                            <span class="pill-ts-badge" [style.background-color]="skill.Color">TS</span>
                        </ng-template>
                        <span class="pill-label">{{ skill.Title }}</span>
                    </div>
                </div>
            </div>

            <!-- What I Do Section -->
            <div class="about-section-block" data-aos="fade-up" data-aos-duration="1000">
                <div class="about-title mt-section">
                    <h3 class="section-title">
                        {{"WhatIDo.Title" | translate}}
                    </h3>
                </div>
                <p class="section-subtitle">{{"WhatIDo.Subtitle" | translate}}</p>
                <div class="services-grid">
                    <div
                        class="service-card"
                        *ngFor='let card of "WhatIDo.Cards" | translate | asArray'
                        data-aos="fade-up"
                        data-aos-duration="1000"
                    >
                        <!-- Card Header -->
                        <div class="service-header">
                            <div class="service-icon-wrapper">
                                <i [class]="card.IconClass + ' service-icon'"></i>
                            </div>
                            <h5 class="service-title">{{ card.Title }}</h5>
                        </div>

                        <!-- Description -->
                        <p class="service-desc">{{ card.Desc }}</p>

                        <!-- Bullet Points -->
                        <ul class="service-bullets">
                            <li *ngFor="let b of card.Bullets">
                                <span class="bullet-arrow">▹</span>
                                <span class="bullet-text">{{ b }}</span>
                            </li>
                        </ul>

                        <!-- Tech Tags -->
                        <div class="service-tags">
                            <span class="service-tag" *ngFor="let t of card.Tags">{{ t }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
