<section class="section more-projects">
    <div class="container">
        <div class="section-box">
            <div class="more-header" data-aos="fade-up" data-aos-duration="1000">
                <h3 class="section-title">{{ 'OtherProjects.Title' | translate }}</h3>
                <p class="more-subtitle">{{ 'OtherProjects.Subtitle' | translate }}</p>
            </div>

            <div class="more-grid">
                <article
                    *ngFor="let project of projects()"
                    class="more-card"
                    data-aos="fade-up"
                    data-aos-duration="1000">
                    <div class="more-card-top">
                        <a
                            *ngIf="project.ghLink"
                            class="more-gh"
                            [href]="project.ghLink"
                            target="_blank"
                            rel="noopener noreferrer"
                            [attr.aria-label]="project.title + ' GitHub'">
                            <i class="fab fa-github"></i>
                        </a>
                        <a
                            *ngIf="project.demoLink"
                            class="more-demo"
                            [href]="project.demoLink"
                            target="_blank"
                            rel="noopener noreferrer"
                            [attr.aria-label]="project.title + ' demo'"
                            [attr.title]="'FeatureProjects.LiveDemo' | translate">
                            <svg class="demo-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path
                                    fill="currentColor"
                                    d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3zM5 5h6v2H7v10h10v-4h2v6H5V5z" />
                            </svg>
                        </a>
                    </div>

                    <h4 class="more-title">
                        <a *ngIf="project.ghLink; else plainTitle" [href]="project.ghLink" target="_blank" rel="noopener noreferrer">{{ project.title }}</a>
                        <ng-template #plainTitle>{{ project.title }}</ng-template>
                    </h4>
                    <p class="more-tagline">{{ project.tagline }}</p>
                    <p class="more-desc">{{ project.description }}</p>

                    <ul class="more-tech">
                        <li *ngFor="let tech of project.technologies">{{ tech }}</li>
                    </ul>
                </article>
            </div>

            <div class="more-footer" data-aos="fade-up" data-aos-duration="1000">
                <a class="github-cta" href="https://github.com/breejesh" target="_blank" rel="noopener noreferrer">
                    {{ 'OtherProjects.GithubCta' | translate }}
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </div>
</section>
